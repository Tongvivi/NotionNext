<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业发布系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
		    background: linear-gradient(135deg, #ffffff 0%, #f7f7f7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .connect-btn {
            width: 100%;
            padding: 8px;
            background: #e9ecef;
            color: #666;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .connect-btn:hover {
            background: #dee2e6;
        }

        .connect-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .realtime-mode {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 16px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .realtime-title {
            color: #333;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .realtime-status {
            color: #666;
            font-size: 13px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 30px;
            flex: 0 0 auto;
            margin-bottom: 0;
            cursor: pointer;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            position: absolute;
            inset: 0;
            background: #ced4da;
            border-radius: 999px;
            transition: all 0.25s;
        }

        .switch-slider::before {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            transition: all 0.25s;
        }

        .switch input:checked + .switch-slider {
            background: #667eea;
        }

        .switch input:checked + .switch-slider::before {
            transform: translateX(24px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffc107;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #28a745;
        }

        .status-dot.disconnected {
            background: #dc3545;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .form-group {
            margin-bottom: 25px;
        }

        .homework-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .homework-item {
            display: flex;
            flex-direction: column;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 15px;
        }

        input[type="date"],
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 200px;
            transition: all 0.3s;
            line-height: 1.6;
        }

        input[type="date"]:focus,
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary.success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .debug-console {
            margin-top: 30px;
            background: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
        }

        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .debug-header h3 {
            color: #61dafb;
            font-size: 14px;
            font-weight: 600;
        }

        .debug-clear {
            background: #2d2d2d;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: background 0.3s;
        }

        .debug-clear:hover {
            background: #3d3d3d;
        }

        .debug-log {
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 5px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .log-info {
            background: #1a3a52;
            color: #61dafb;
            border-left: 3px solid #61dafb;
        }

        .log-success {
            background: #1a3d2e;
            color: #4ade80;
            border-left: 3px solid #4ade80;
        }

        .log-error {
            background: #3d1a1a;
            color: #ff6b6b;
            border-left: 3px solid #ff6b6b;
        }

        .log-warning {
            background: #3d3a1a;
            color: #ffd93d;
            border-left: 3px solid #ffd93d;
        }

        .log-time {
            color: #888;
            font-size: 11px;
            margin-right: 8px;
        }

        .subject-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
        }

        .tag-chinese {
            background: #ffeaa7;
            color: #d63031;
        }

        .tag-math {
            background: #74b9ff;
            color: #0984e3;
        }

        .tag-english {
            background: #a29bfe;
            color: #6c5ce7;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .homework-grid {
                grid-template-columns: 1fr;
            }

            textarea {
                min-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 小学生作业发布系统</h1>
        </div>

        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">正在连接...</span>
        </div>

        <button class="connect-btn" id="connectBtn" onclick="handleConnect()">
            🔌 断开连接
        </button>

        <div class="realtime-mode">
            <div>
                <div class="realtime-title">实时投送模式</div>
                <div class="realtime-status" id="realtimeStatus">已关闭</div>
            </div>
            <label class="switch" for="realtimeMode" title="实时投送模式">
                <input type="checkbox" id="realtimeMode">
                <span class="switch-slider"></span>
            </label>
        </div>

        <form id="homeworkForm">
		
		<div class="homework-grid" style="grid-template-columns: repeat(2, 1fr);">
				<div class="form-group">
					<label for="topic">📡 设备SN码</label>
					<input type="text" id="topic" value="" required>
				</div>

				<div class="form-group">
					<label for="date">📅 日期</label>
					<input type="date" id="date" required>
				</div>
			</div>

            <div class="homework-grid">
                <div class="homework-item">
                    <label for="chinese"><span class="subject-tag tag-chinese">语文</span></label>
                    <textarea id="chinese" placeholder="请输入语文作业内容..." required></textarea>
                </div>

                <div class="homework-item">
                    <label for="math"><span class="subject-tag tag-math">数学</span></label>
                    <textarea id="math" placeholder="请输入数学作业内容..." required></textarea>
                </div>

                <div class="homework-item">
                    <label for="english"><span class="subject-tag tag-english">英语</span></label>
                    <textarea id="english" placeholder="请输入英语作业内容..." required></textarea>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">📤 发送作业</button>
        </form>

        <div class="message" id="message"></div>

        <div class="debug-console">
            <div class="debug-header">
                <h3>🔍 调试控制台</h3>
                <button class="debug-clear" onclick="clearDebugLog()">清空日志</button>
            </div>
            <div id="debugLog"></div>
        </div>
    </div>

    <script>
        let client;
        let realtimeSendTimer;
        let lastSentSnapshot = '';
        const broker = 'broker.emqx.io';
        const port = 8084;
        const DEVICE_CODE_STORAGE_KEY = 'mqtt_homework_device_code';
        const REALTIME_MODE_STORAGE_KEY = 'mqtt_homework_realtime_mode';
        const REALTIME_SEND_DELAY = 800;

        function normalizeSN(sn) {
            const value = (sn || '').trim().toUpperCase();
            if (!value) {
                return '';
            }
            return value;
        }

        function getSNFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('sn') || params.get('SN') || params.get('device_sn') || params.get('deviceSN') || '';
        }

        // 优先从网址参数加载SN码，没有参数时再读取localStorage
        function loadInitialSN() {
            const urlSN = normalizeSN(getSNFromUrl());
            if (urlSN) {
                document.getElementById('topic').value = urlSN;
                saveSN(urlSN);
                addDebugLog(`已从网址加载SN码: ${urlSN}`, 'info');
                return;
            }

            const savedSN = localStorage.getItem(DEVICE_CODE_STORAGE_KEY);
            if (savedSN) {
                const normalizedSN = normalizeSN(savedSN);
                document.getElementById('topic').value = normalizedSN;
                addDebugLog(`已加载保存的SN码: ${normalizedSN}`, 'info');
            }
        }

        // 保存SN码到localStorage
        function saveSN(sn) {
            const normalizedSN = normalizeSN(sn);
            if (!normalizedSN) {
                return;
            }
            if (localStorage.getItem(DEVICE_CODE_STORAGE_KEY) === normalizedSN) {
                return;
            }
            localStorage.setItem(DEVICE_CODE_STORAGE_KEY, normalizedSN);
            addDebugLog(`SN码已保存: ${normalizedSN}`, 'info');
        }

        // 监听SN码输入框变化
        document.addEventListener('DOMContentLoaded', function() {
            const topicInput = document.getElementById('topic');
            topicInput.addEventListener('change', function() {
                const normalizedSN = normalizeSN(this.value);
                this.value = normalizedSN;
                saveSN(normalizedSN);
            });
        });

        function isRealtimeModeEnabled() {
            return document.getElementById('realtimeMode').checked;
        }

        function updateRealtimeStatus() {
            const realtimeStatus = document.getElementById('realtimeStatus');
            realtimeStatus.textContent = isRealtimeModeEnabled() ? '已开启' : '已关闭';
        }

        function scheduleRealtimeSend(force = false) {
            if (!isRealtimeModeEnabled()) {
                return;
            }

            clearTimeout(realtimeSendTimer);
            realtimeSendTimer = setTimeout(() => {
                realtimeSendTimer = null;
                sendHomework({
                    source: 'realtime',
                    showToast: false,
                    force
                });
            }, REALTIME_SEND_DELAY);
        }

        function handleRealtimeModeChange() {
            const enabled = isRealtimeModeEnabled();
            localStorage.setItem(REALTIME_MODE_STORAGE_KEY, enabled ? '1' : '0');
            updateRealtimeStatus();

            if (enabled) {
                addDebugLog('实时投送模式已开启', 'info');
                sendHomework({
                    source: 'realtime',
                    showToast: false,
                    force: true
                });
                return;
            }

            clearTimeout(realtimeSendTimer);
            addDebugLog('实时投送模式已关闭', 'info');
        }

        function initRealtimeMode() {
            const realtimeMode = document.getElementById('realtimeMode');
            realtimeMode.checked = localStorage.getItem(REALTIME_MODE_STORAGE_KEY) === '1';
            updateRealtimeStatus();
            realtimeMode.addEventListener('change', handleRealtimeModeChange);

            ['topic', 'date', 'chinese', 'math', 'english'].forEach((fieldId) => {
                const field = document.getElementById(fieldId);
                const eventName = field.tagName === 'TEXTAREA' ? 'input' : 'change';
                field.addEventListener(eventName, () => scheduleRealtimeSend());
            });
        }

        // 设置默认日期为今天
        document.getElementById('date').valueAsDate = new Date();

        // 页面加载时加载网址参数或保存的SN码
        loadInitialSN();

        // 初始状态
        updateStatus('connecting', '正在连接...');

        // 处理连接按钮
        function handleConnect() {
            const btn = document.getElementById('connectBtn');
            
            if (client && client.isConnected()) {
                // 断开连接
                addDebugLog('用户请求断开连接...', 'warning');
                client.disconnect();
                updateStatus('disconnected', '未连接');
                btn.textContent = '🔌 连接到 MQTT 服务器';
                btn.disabled = false;
                addDebugLog('已断开连接', 'info');
            } else {
                // 连接
                btn.disabled = true;
                btn.textContent = '⏳ 正在连接...';
                connectMQTT();
            }
        }

        // 调试日志功能
        function addDebugLog(message, type = 'info') {
            const logDiv = document.getElementById('debugLog');
            const logEntry = document.createElement('div');
            logEntry.className = 'debug-log log-' + type;
            
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            logEntry.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
            
            logDiv.appendChild(logEntry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearDebugLog() {
            document.getElementById('debugLog').innerHTML = '';
            addDebugLog('日志已清空', 'info');
        }

        // 连接到 MQTT 服务器
        function connectMQTT() {
            const clientId = 'homework_sender_' + Math.random().toString(16).substr(2, 8);
            addDebugLog(`正在创建客户端... ClientID: ${clientId}`, 'info');
            addDebugLog(`服务器: ${broker}:${port} (WebSocket Secure)`, 'info');
            
            client = new Paho.MQTT.Client(broker, port, clientId);

            client.onConnectionLost = onConnectionLost;

            addDebugLog('开始连接到 MQTT 服务器...', 'info');
            
            client.connect({
                onSuccess: onConnect,
                onFailure: onFailure,
                useSSL: true,
                timeout: 10,
                keepAliveInterval: 60
            });
        }

        function onConnect() {
            updateStatus('connected', '已连接到服务器');
            addDebugLog('✅ 成功连接到 MQTT 服务器!', 'success');
            
            const btn = document.getElementById('connectBtn');
            btn.textContent = '🔌 断开连接';
            btn.disabled = false;
        }

        function onFailure(message) {
            updateStatus('disconnected', '连接失败');
            addDebugLog(`❌ 连接失败!`, 'error');
            addDebugLog(`错误代码: ${message.errorCode}`, 'error');
            addDebugLog(`错误信息: ${message.errorMessage}`, 'error');
            
            if (message.errorCode === 7) {
                addDebugLog('可能原因: WebSocket 连接被拒绝或超时', 'warning');
                addDebugLog('建议: 检查网络连接或防火墙设置', 'warning');
            }
            
            const btn = document.getElementById('connectBtn');
            btn.textContent = '🔌 重新连接';
            btn.disabled = false;
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                updateStatus('disconnected', '连接已断开');
                addDebugLog('⚠️ 连接已断开', 'warning');
                addDebugLog(`错误代码: ${responseObject.errorCode}`, 'warning');
                addDebugLog(`错误信息: ${responseObject.errorMessage}`, 'warning');
                
                const btn = document.getElementById('connectBtn');
                btn.textContent = '🔌 重新连接';
                btn.disabled = false;
            }
        }

        function updateStatus(status, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (status === 'connecting') {
                dot.className = 'status-dot';
            } else {
                dot.className = 'status-dot ' + status;
            }
            statusText.textContent = text;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${month}月${day}日`;
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // 重置发送按钮状态
        function resetSubmitButton() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.textContent = '📤 发送作业';
            submitBtn.className = 'btn-primary';
        }

        // 设置发送成功状态
        function setSubmitSuccess() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.textContent = '✅ 发送成功';
            submitBtn.className = 'btn-primary success';
            
            // 3秒后恢复原状
            setTimeout(resetSubmitButton, 3000);
        }

        function sendHomework(options = {}) {
            const source = options.source || 'manual';
            const showToast = options.showToast !== false;
            const force = options.force === true;
            const actionText = source === 'realtime' ? '实时投送' : '发送';
            
            if (!client || !client.isConnected()) {
                if (showToast) {
                    showMessage('未连接到服务器,请稍候重试', 'error');
                }
                addDebugLog(`❌ ${actionText}失败: 客户端未连接`, 'error');
                return false;
            }

            let topic = normalizeSN(document.getElementById('topic').value);
            if (!topic) {
                if (showToast) {
                    showMessage('请输入设备SN码', 'error');
                }
                addDebugLog(`❌ ${actionText}失败: 设备SN码不能为空`, 'error');
                return false;
            }

            // 保存SN码
            document.getElementById('topic').value = topic;
            saveSN(topic);

            const dateValue = document.getElementById('date').value;
            if (!dateValue) {
                if (showToast) {
                    showMessage('请选择日期', 'error');
                }
                addDebugLog(`❌ ${actionText}失败: 日期不能为空`, 'error');
                return false;
            }

            const data = {
                date: formatDate(dateValue),
                chinese: document.getElementById('chinese').value,
                math: document.getElementById('math').value,
                english: document.getElementById('english').value
            };

            topic = "homework/" + topic + "/assignment";
            const payload = JSON.stringify(data, null, 2);
            const snapshot = topic + '|' + payload;

            if (!force && snapshot === lastSentSnapshot) {
                return true;
            }

            addDebugLog(`准备${actionText}消息到主题: ${topic}`, 'info');
            addDebugLog(`消息内容: ${payload}`, 'info');

            const message = new Paho.MQTT.Message(payload);
            message.destinationName = topic;
            message.qos = 1;
			message.retained = true;

            try {
                client.send(message);
                lastSentSnapshot = snapshot;
                if (showToast) {
                    showMessage('✅ 作业发送成功!', 'success');
                    setSubmitSuccess();
                }
                addDebugLog(`✅ ${actionText}成功!`, 'success');
                addDebugLog(`QoS 级别: ${message.qos}`, 'info');
                addDebugLog(`消息大小: ${message.payloadBytes.length} 字节`, 'info');
                return true;
            } catch (error) {
                if (showToast) {
                    showMessage('❌ 发送失败:' + error.message, 'error');
                }
                addDebugLog(`❌ ${actionText}失败: ${error.message}`, 'error');
                addDebugLog(`错误堆栈: ${error.stack}`, 'error');
                return false;
            }
        }

        document.getElementById('homeworkForm').addEventListener('submit', function(e) {
            e.preventDefault();
            sendHomework({
                source: 'manual',
                showToast: true,
                force: true
            });
        });

        initRealtimeMode();

        // 页面加载时自动连接
        addDebugLog('🚀 页面加载完成,开始自动连接...', 'info');
        connectMQTT();

        // 监听页面关闭
        window.addEventListener('beforeunload', function() {
            if (client && client.isConnected()) {
                addDebugLog('页面即将关闭,断开连接...', 'warning');
                client.disconnect();
            }
        });
    </script>
</body>
</html>
