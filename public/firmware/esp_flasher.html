<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon-star.png" type="image/x-icon">
    <title>ESP32在线刷固件工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #eeeeee 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        
        .section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 10px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 600;
        }
        
        input[type="file"],
        input[type="url"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="file"]:focus,
        input[type="url"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover:not(:disabled) {
            background: #c82333;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 500;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .progress {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        #terminal {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            height: 450px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
                margin-top: 10px;
        }
        
        #terminal::-webkit-scrollbar {
            width: 8px;
        }
        
        #terminal::-webkit-scrollbar-track {
            background: #2d2d2d;
        }
        
        #terminal::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
        
        .log-entry {
            margin-bottom: 2px;
        }
        
        .log-timestamp {
            color: #888;
            margin-right: 10px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 ESP32在线刷固件工具</h1>
            <p>支持固件上传和串口日志监控</p>
        </div>
        
        <div class="content">
            <!-- 固件刷写部分 -->
            <div class="section">
                <h2>📤 固件刷写</h2>
                
                <div class="form-group">
                    <label>选择固件来源：</label>
                    <select id="firmwareSource" onchange="toggleFirmwareInput()">
                        <option value="preset">预设固件</option>
                        <option value="upload">本地上传</option>
                    </select>
                </div>
                
                <div class="form-group" id="uploadGroup" style="display:none;">
                    <label>选择固件文件（.bin）：</label>
                    <input type="file" id="firmwareFile" accept=".bin">
                </div>
                
                <div class="form-group" id="urlGroup" style="display:none;">
                    <label>固件URL地址：</label>
                    <input type="url" id="firmwareUrl" placeholder="https://example.com/firmware.bin">
                </div>
                
                <div class="form-group" id="presetGroup">
                    <label>选择预设固件：</label>
                    <select id="presetFirmware">
                        <option value="">-- 选择固件 --</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>刷写地址（十六进制）：</label>
                    <input type="text" id="flashOffset" value="0" placeholder="0">
                </div>
                
                <div class="btn-group">
                    <button class="btn-primary" id="connectBtn" onclick="connectDevice()">
                        🔌 连接设备
                    </button>
                    
                    <button class="btn-primary" id="flashBtn" onclick="flashFirmware()" disabled>
                        ⚡ 开写固件
                    </button>
                    
                    <button class="btn-danger" id="eraseBtn" onclick="eraseFlash()" disabled>
                        🗑️ 擦除Flash
                    </button>
                    
                    <button class="btn-danger" id="disconnectBtn" onclick="disconnectDevice()" disabled>
                        🔌 断开连接
                    </button>
                </div>
                <div class="progress" id="progressBar">
                    <div class="progress-bar" id="progressBarInner">0%</div>
                </div>
                
                <div id="flashStatus"></div>
            </div>
            
            <!-- 串口日志部分 -->
            <div class="section">
                <h2>📊 输出与调试</h2>
                <div class="status info" style="display: block; margin-top: 0;">
                    实时串口日志已拆分到独立页面，避免与刷机流程抢占串口。
                </div>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="window.open('/firmware/esp_serial_log.html', '_self')">
                        🔍 打开独立串口日志页
                    </button>
                    <button class="btn-secondary" onclick="clearLog()">
                        🗑️ 清空输出
                    </button>
                </div>
                <div id="terminal"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script type="module">
        import { ESPLoader, Transport } from 'https://unpkg.com/esptool-js@0.4.5/bundle.js';
        
        let device = null;
        let transport = null;
        let chip = null;
        let esploader = null;
        let isConnected = false;
        let isLogging = false;
        let logReader = null;
        let logStreamClosed = null;
        let serialEventsRegistered = false;
        
        // Terminal 对象
        const term = {
            logs: [],
            clean() {
                this.logs = [];
                this.updateTerminal();
            },
            writeLine(data) {
                this.logs.push(data);
                this.updateTerminal();
            },
            write(data) {
                if (this.logs.length > 0) {
                    this.logs[this.logs.length - 1] += data;
                } else {
                    this.logs.push(data);
                }
                this.updateTerminal();
            },
            updateTerminal() {
                const terminal = document.getElementById('terminal');
                terminal.innerHTML = this.logs.map(log => 
                    `<div class="log-entry">${this.escapeHtml(log)}</div>`
                ).join('');
                terminal.scrollTop = terminal.scrollHeight;
            },
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };
        
        window.toggleFirmwareInput = function() {
            const source = document.getElementById('firmwareSource').value;
            document.getElementById('uploadGroup').style.display = source === 'upload' ? 'block' : 'none';
            document.getElementById('urlGroup').style.display = source === 'url' ? 'block' : 'none';
            document.getElementById('presetGroup').style.display = source === 'preset' ? 'block' : 'none';
        }

        function updatePresetOptions(items) {
            const presetSelect = document.getElementById('presetFirmware')
            presetSelect.innerHTML = '<option value="">-- 选择固件 --</option>'

            items.forEach((item) => {
                const option = document.createElement('option')
                option.value = item.url
                option.textContent = item.label || item.name || item.url
                presetSelect.appendChild(option)
            })
        }

        function extractBinFilesFromDirectoryListing(html) {
            const regex = /href\s*=\s*["']([^"']+\.bin)["']/gi
            const fileMap = new Map()
            let match

            while ((match = regex.exec(html)) !== null) {
                const href = match[1]
                const fileName = decodeURIComponent(href.split('/').pop())
                if (!fileName) continue
                if (!fileName.toLowerCase().endsWith('.bin')) continue

                fileMap.set(fileName, {
                    name: fileName,
                    label: fileName.replace(/\.bin$/i, ''),
                    url: `/firmware/bin/${encodeURIComponent(fileName)}`
                })
            }

            return Array.from(fileMap.values())
        }

        async function loadPresetFirmwares() {
            const presetSelect = document.getElementById('presetFirmware')
            presetSelect.disabled = true

            try {
                const response = await fetch('/firmware/firmware-list.json', { cache: 'no-store' })
                if (!response.ok) {
                    throw new Error('firmware-list.json 不可用')
                }

                const data = await response.json()
                const items = Array.isArray(data.items) ? data.items : []
                updatePresetOptions(items)

                if (items.length === 0) {
                    showStatus('未找到可用的本地固件，请检查 /public/firmware/bin 目录', 'info')
                } else {
                    showStatus(`已自动加载 ${items.length} 个本地固件`, 'success')
                }
            } catch (jsonError) {
                // 兼容静态服务器目录索引
                try {
                    const response = await fetch('/firmware/bin/')
                    if (!response.ok) {
                        throw new Error('目录索引不可用')
                    }

                    const html = await response.text()
                    const items = extractBinFilesFromDirectoryListing(html)
                    updatePresetOptions(items)

                    if (items.length === 0) {
                        throw new Error('目录中没有bin固件')
                    }
                    showStatus(`已自动加载 ${items.length} 个本地固件`, 'success')
                } catch (fallbackError) {
                    console.error('加载固件列表失败:', jsonError, fallbackError)
                    showStatus('自动加载固件失败，请改用“本地上传”', 'error')
                }
            } finally {
                presetSelect.disabled = false
            }
        }
        
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('flashStatus');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }

        function setDisabled(id, disabled) {
            const element = document.getElementById(id);
            if (element) {
                element.disabled = disabled;
            }
        }

        function updateUiDisconnectedState() {
            setDisabled('connectBtn', false);
            setDisabled('flashBtn', true);
            setDisabled('eraseBtn', true);
            setDisabled('disconnectBtn', true);
            setDisabled('startLogBtn', true);
            setDisabled('stopLogBtn', true);
        }

        function isCurrentDevicePort(port) {
            if (!device || !port) return false;
            if (device === port) return true;
            if (typeof device.getInfo !== 'function' || typeof port.getInfo !== 'function') {
                return false;
            }

            const a = device.getInfo() || {};
            const b = port.getInfo() || {};
            return a.usbVendorId === b.usbVendorId && a.usbProductId === b.usbProductId;
        }

        async function handleCurrentPortDisconnected() {
            const wasLogging = isLogging;
            isLogging = false;

            await cleanupLoggingResources();

            transport = null;
            esploader = null;
            chip = null;
            isConnected = false;
            device = null;

            updateUiDisconnectedState();
            if (wasLogging) {
                addLog('=== 串口已断开，日志监控结束 ===');
            } else {
                term.writeLine('检测到串口断开');
            }
            showStatus('串口连接已断开，请重新点击“连接设备”', 'error');
        }

        function registerSerialEventHandlers() {
            if (serialEventsRegistered || !navigator.serial) {
                return;
            }

            navigator.serial.addEventListener('disconnect', async (event) => {
                try {
                    if (!isCurrentDevicePort(event.target)) {
                        return;
                    }
                    await handleCurrentPortDisconnected();
                } catch (error) {
                    console.error('处理串口断开事件失败:', error);
                }
            });

            navigator.serial.addEventListener('connect', (event) => {
                try {
                    const info = typeof event.target?.getInfo === 'function' ? event.target.getInfo() : {};
                    const vendor = info.usbVendorId ? `0x${info.usbVendorId.toString(16)}` : '未知VID';
                    const product = info.usbProductId ? `0x${info.usbProductId.toString(16)}` : '未知PID';
                    term.writeLine(`检测到串口设备接入: ${vendor}/${product}`);
                    if (!device && !isConnected && !isLogging) {
                        showStatus('检测到可用串口，请点击“连接设备”', 'info');
                    }
                } catch (error) {
                    console.error('处理串口接入事件失败:', error);
                }
            });

            serialEventsRegistered = true;
        }
        
        function updateProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            const progressBarInner = document.getElementById('progressBarInner');
            progressBar.style.display = 'block';
            progressBarInner.style.width = percent + '%';
            progressBarInner.textContent = Math.round(percent) + '%';
        }
        
        window.connectDevice = async function() {
            try {
                if (!navigator.serial) {
                    showStatus('您的浏览器不支持Web Serial API，请使用Chrome、Edge或Opera浏览器', 'error');
                    return;
                }

                registerSerialEventHandlers();
                
                if (isConnected) {
                    showStatus('设备已连接', 'info');
                    return;
                }
                
                showStatus('正在选择设备...', 'info');
                
                // 选择串口设备
                device = await navigator.serial.requestPort();
                
                showStatus('正在连接设备...', 'info');
                
                // 创建传输层
                transport = new Transport(device, true);
                
                // 创建 ESPLoader
                esploader = new ESPLoader({
                    transport: transport,
                    baudrate: 115200,
                    terminal: term
                });
                
                showStatus('正在识别芯片...', 'info');
                
                // 连接并识别芯片
                chip = await esploader.main();
                
                isConnected = true;
                
                showStatus(`✅ 连接成功！芯片型号: ${chip}`, 'success');
                
                // 更新按钮状态
                setDisabled('connectBtn', true);
                setDisabled('flashBtn', false);
                setDisabled('eraseBtn', false);
                setDisabled('disconnectBtn', false);
                setDisabled('startLogBtn', false);
                
            } catch (error) {
                isConnected = false;
                if (error.message && error.message.includes('No port selected')) {
                    showStatus('未选择端口', 'info');
                } else {
                    showStatus('连接失败: ' + error.message, 'error');
                    term.writeLine('连接错误: ' + error.message);
                }
                console.error('连接错误:', error);
            }
        }
        
        async function getFirmwareData() {
            const source = document.getElementById('firmwareSource').value;
            let contents;
            
            if (source === 'upload') {
                const file = document.getElementById('firmwareFile').files[0];
                if (!file) {
                    throw new Error('请选择固件文件');
                }
                contents = await file.arrayBuffer();
            } else if (source === 'url') {
                const url = document.getElementById('firmwareUrl').value;
                if (!url) {
                    throw new Error('请输入固件URL');
                }
                const response = await fetch(url);
                if (!response.ok) throw new Error('下载固件失败');
                contents = await response.arrayBuffer();
            } else if (source === 'preset') {
                const url = document.getElementById('presetFirmware').value;
                if (!url) {
                    throw new Error('请选择预设固件');
                }
                const response = await fetch(url);
                if (!response.ok) throw new Error('下载固件失败');
                contents = await response.arrayBuffer();
            }
            
            // 转换为字符串格式（esptool-js期望的格式）
            const bytes = new Uint8Array(contents);
            let binaryString = '';
            for (let i = 0; i < bytes.length; i++) {
                binaryString += String.fromCharCode(bytes[i]);
            }
            return binaryString;
        }
        
        window.flashFirmware = async function() {
            if (!isConnected || !esploader) {
                showStatus('请先连接设备', 'error');
                return;
            }
            
            try {
                showStatus('正在准备固件...', 'info');
                document.getElementById('flashBtn').disabled = true;
                document.getElementById('eraseBtn').disabled = true;
                
                const firmwareData = await getFirmwareData();
                const offset = parseInt(document.getElementById('flashOffset').value, 16);
                
                showStatus('正在刷写固件...', 'info');
                updateProgress(0);
                
                // firmwareData 现在是字符串格式
                const fileArray = [{
                    data: firmwareData, 
                    address: offset
                }];
                
                await esploader.writeFlash({
                    fileArray: fileArray,
                    flashSize: "keep",
                    eraseAll: false,
                    compress: true,
                    reportProgress: (fileIndex, written, total) => {
                        const percent = (written / total) * 100;
                        updateProgress(percent);
                    }
                });
                
                updateProgress(100);
                showStatus('✅ 固件刷写成功！', 'success');
                term.writeLine('✅ 固件刷写完成');
                
            } catch (error) {
                showStatus('刷写失败: ' + error.message, 'error');
                term.writeLine('刷写错误: ' + error.message);
                console.error('刷写错误:', error);
            } finally {
                document.getElementById('flashBtn').disabled = false;
                document.getElementById('eraseBtn').disabled = false;
            }
        }
        
        window.eraseFlash = async function() {
            if (!isConnected || !esploader) {
                showStatus('请先连接设备', 'error');
                return;
            }
            
            if (!confirm('确定要擦除整个Flash吗？此操作不可恢复！')) {
                return;
            }
            
            try {
                showStatus('正在擦除Flash...', 'info');
                document.getElementById('eraseBtn').disabled = true;
                document.getElementById('flashBtn').disabled = true;
                
                await esploader.eraseFlash();
                
                showStatus('✅ Flash擦除成功！', 'success');
                term.writeLine('✅ Flash擦除完成');
                
            } catch (error) {
                showStatus('擦除失败: ' + error.message, 'error');
                term.writeLine('擦除错误: ' + error.message);
                console.error('擦除错误:', error);
            } finally {
                document.getElementById('eraseBtn').disabled = false;
                document.getElementById('flashBtn').disabled = false;
            }
        }
        
        window.disconnectDevice = async function() {
            try {
                if (isLogging) {
                    await window.stopLogging();
                }
                
                if (transport) {
                    await transport.disconnect();
                    await transport.waitForUnlock(1500);
                }
                
                device = null;
                transport = null;
                chip = null;
                esploader = null;
                isConnected = false;
                
                showStatus('设备已断开连接', 'info');
                term.writeLine('设备已断开');
                
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('flashBtn').disabled = true;
                document.getElementById('eraseBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = true;
                setDisabled('startLogBtn', true);
                document.getElementById('progressBar').style.display = 'none';
                
            } catch (error) {
                showStatus('断开连接失败: ' + error.message, 'error');
                console.error('断开错误:', error);
            }
        }
        
        function addLog(text) {
            const timestamp = new Date().toLocaleTimeString();
            term.writeLine(`[${timestamp}] ${text}`);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function resetDeviceToRunMode() {
            if (!device || typeof device.setSignals !== 'function') {
                return;
            }

            try {
                // 触发一次 EN 复位，让芯片从 bootloader/stub 回到用户固件运行态
                await device.setSignals({ dataTerminalReady: false, requestToSend: true });
                await sleep(120);
                await device.setSignals({ dataTerminalReady: false, requestToSend: false });
                await sleep(240);
            } catch (error) {
                console.warn('切换运行模式失败:', error);
            }
        }

        async function cleanupLoggingResources() {
            if (logReader) {
                try {
                    await logReader.cancel();
                } catch (error) {
                    console.warn('取消日志读取失败:', error);
                }
                try {
                    logReader.releaseLock();
                } catch (error) {
                    console.warn('释放日志读取锁失败:', error);
                }
                logReader = null;
            }

            if (logStreamClosed) {
                try {
                    await logStreamClosed;
                } catch (error) {
                    console.warn('日志流关闭时异常:', error);
                }
                logStreamClosed = null;
            }

            if (device && device.readable) {
                try {
                    await device.close();
                } catch (error) {
                    console.warn('关闭日志串口失败:', error);
                }
            }
        }
        
        window.startLogging = async function() {
            if (!device) {
                showStatus('请先连接设备', 'error');
                return;
            }
            
            if (isLogging) {
                return;
            }
            
            try {
                showStatus('正在切换到日志模式...', 'info');

                // 先尝试让芯片退出 stub，回到固件运行态
                if (esploader && typeof esploader.hardReset === 'function') {
                    try {
                        await esploader.hardReset();
                        await sleep(300);
                    } catch (error) {
                        console.warn('硬复位失败，继续尝试直接读串口日志:', error);
                    }
                }

                // 断开 ESPLoader 以释放串口
                if (transport) {
                    await transport.disconnect();
                    await transport.waitForUnlock(1500);
                    transport = null;
                    esploader = null;
                    chip = null;
                    isConnected = false;
                }
                
                const baudRate = parseInt(document.getElementById('baudRate').value, 10);

                if (device.readable) {
                    await device.close();
                    await sleep(80);
                }
                
                // 重新打开串口用于日志监控
                await device.open({ baudRate: baudRate });
                await resetDeviceToRunMode();
                
                isLogging = true;
                setDisabled('connectBtn', true);
                setDisabled('startLogBtn', true);
                setDisabled('stopLogBtn', false);
                setDisabled('flashBtn', true);
                setDisabled('eraseBtn', true);
                
                addLog('=== 开始监控串口日志 ===');
                
                const decoder = new TextDecoderStream();
                logStreamClosed = device.readable.pipeTo(decoder.writable).catch(() => {});
                logReader = decoder.readable.getReader();
                
                // 读取数据
                while (isLogging) {
                    try {
                        const { value, done } = await logReader.read();
                        if (done) {
                            break;
                        }
                        if (value) {
                            addLog(value);
                        }
                    } catch (error) {
                        if (isLogging) {
                            console.error('读取错误:', error);
                            break;
                        }
                    }
                }
                
            } catch (error) {
                showStatus('启动日志监控失败: ' + error.message, 'error');
                console.error('日志错误:', error);
                isLogging = false;
                await cleanupLoggingResources();
                updateUiDisconnectedState();
            } finally {
                // 非手动 stop 的异常退出路径
                if (isLogging) {
                    isLogging = false;
                    await cleanupLoggingResources();
                    addLog('=== 日志监控已结束（串口中断） ===');
                    showStatus('日志监控已中断，请重新开始或重新连接设备', 'error');
                    updateUiDisconnectedState();
                }
            }
        }
        
        window.stopLogging = async function() {
            if (!isLogging) {
                return;
            }
            
            isLogging = false;
            
            try {
                await cleanupLoggingResources();
                
                addLog('=== 停止监控串口日志 ===');
                showStatus('已停止日志监控。若要继续刷机，请点击“连接设备”重新进入刷机模式', 'info');
                
            } catch (error) {
                console.error('停止日志错误:', error);
                showStatus('停止日志监控失败: ' + error.message, 'error');
            } finally {
                transport = null;
                esploader = null;
                chip = null;
                isConnected = false;
                updateUiDisconnectedState();
            }
        }
        
        window.clearLog = function() {
            term.clean();
        }

        if (navigator.serial) {
            registerSerialEventHandlers();
        }

        loadPresetFirmwares()
    </script>
</body>
</html>
